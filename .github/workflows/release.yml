name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build, scan, and publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Run full test suite
        run: |
          pip install -e ".[dev]"
          pytest

      - name: Generate SBOM (CycloneDX)
        run: |
          pip install cyclonedx-bom
          cyclonedx-py environment --pyproject pyproject.toml --of JSON -o sbom.cdx.json
          cyclonedx-py environment --pyproject pyproject.toml --of XML -o sbom.cdx.xml

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: false
          load: true
          tags: owasp-inspector:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan (gates the release)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: owasp-inspector:${{ github.ref_name }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Save image tarball
        env:
          REF_NAME: ${{ github.ref_name }}
        run: docker save "owasp-inspector:$REF_NAME" -o "owasp-inspector-$REF_NAME.tar"

      - name: Generate changelog since last tag
        id: changelog
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 "$REF_NAME^" 2>/dev/null || echo "")
          {
            echo "changelog<<EOF"
            if [ -n "$PREV_TAG" ]; then
              git log --pretty=format:"- %s (%h)" "${PREV_TAG}..${REF_NAME}"
            else
              git log --pretty=format:"- %s (%h)" "$REF_NAME"
            fi
            echo ""
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## Changes
            ${{ steps.changelog.outputs.changelog }}

            ## Artifacts
            - `owasp-inspector-${{ github.ref_name }}.tar` — Docker image (`docker load -i ...`)
            - `sbom.cdx.json` / `sbom.cdx.xml` — CycloneDX SBOM of the release environment
          files: |
            owasp-inspector-${{ github.ref_name }}.tar
            sbom.cdx.json
            sbom.cdx.xml
          generate_release_notes: true
